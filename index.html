<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SYSTEM_OVERRIDE // SPROCKET</title>
  <meta name="description" content="this is my website, enjoy" />
  <style>
    :root{
      --bg:#000000;
      --mono: "Courier New", Courier, monospace;
      --neon-green: #00FF00;
      --neon-green-dark: #008000;
      --blood-red: #FF0000;
      --deep-crimson: #8B0000;
      --card-bg: rgba(0,0,0,0.6);
      --glass: rgba(0, 0, 0, 0.5);
      --glass-border: rgba(0,255,0,0.14);
      --z-canvas: 1;
      --z-ui: 10;
    }

    /* Reset + base */
    * { box-sizing: border-box; margin:0; padding:0; }
    html,body { height:100%; background:var(--bg); font-family:var(--mono); color:var(--neon-green); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    a { color:inherit; text-decoration:none; }

    /* Canvas */
    canvas#matrix { position:fixed; inset:0; width:100%; height:100%; display:block; z-index:var(--z-canvas); pointer-events:none; background:transparent; }

    /* Centering */
    .center { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:var(--z-ui); padding:24px; }

    /* Card */
    .card {
      width:360px; height:140px; max-width:calc(100% - 48px);
      background: linear-gradient(180deg, rgba(0,0,0,0.58), rgba(0,0,0,0.45));
      border:1px solid rgba(0,255,0,0.14);
      box-shadow: 0 0 24px rgba(0,255,0,0.06), 0 4px 40px rgba(0,0,0,0.6), inset 0 0 8px rgba(0,255,0,0.02);
      backdrop-filter: blur(6px);
      border-radius:12px; padding:18px;
      display:flex; flex-direction:column; gap:12px;
      transition: width 420ms cubic-bezier(.2,.9,.2,1), height 420ms cubic-bezier(.2,.9,.2,1), transform 360ms ease, box-shadow 260ms ease;
      overflow:hidden; cursor:default; position:relative;
    }
    .card::before{
      content:""; position:absolute; inset:0; border-radius:12px; pointer-events:none;
      box-shadow: 0 0 28px rgba(0,255,0,0.18), 0 0 80px rgba(0,255,0,0.06), inset 0 0 2px rgba(0,255,0,0.06);
      transition: box-shadow 260ms ease, border-color 260ms ease;
    }

    /* Expanded (desktop hover) */
    @media (hover: hover) {
      .card:hover { width:880px; height:540px; transform:translateY(-6px); box-shadow: 0 0 66px rgba(0,255,0,0.22), 0 14px 120px rgba(0,0,0,0.7); }
      .card:hover::before { box-shadow: 0 0 100px rgba(0,255,0,0.28); }
    }
    .card.expanded { width:880px; height:540px; transform:translateY(-6px); box-shadow: 0 0 66px rgba(0,255,0,0.22), 0 14px 120px rgba(0,0,0,0.7); }
    .card.expanded::before { box-shadow: 0 0 100px rgba(0,255,0,0.28); }

    /* Header */
    .header { font-size:20px; letter-spacing:1px; color:var(--neon-green); text-shadow: 0 0 8px rgba(0,255,0,0.15); display:flex; align-items:center; gap:12px; }
    .typer { font-weight:700; white-space:nowrap; overflow:hidden; display:inline-block; }

    /* Controls */
    .controls { display:flex; gap:8px; align-items:center; }
    .input-wrap { position:relative; flex:1; min-width:80px; }
    input.search {
      width:100%; background:transparent; border:1px solid rgba(0,255,0,0.12);
      color:var(--neon-green); padding:12px 14px; border-radius:8px; outline:none;
      box-shadow: inset 0 -8px 24px rgba(0,0,0,0.6); font-family:var(--mono); font-size:14px; caret-color:var(--neon-green);
      transition: box-shadow 160ms ease, border 160ms ease;
    }
    .input-wrap .block-caret { position:absolute; top:50%; left:12px; transform:translateY(-50%); width:8px; height:18px; background:transparent; border-left:2px solid var(--neon-green); animation: blinkCaret 1s steps(2,start) infinite; pointer-events:none; mix-blend-mode:screen; }
    input.search.with-caret { padding-left:28px; }
    @keyframes blinkCaret { 0% { opacity:1; } 50% { opacity:0; } 100% { opacity:1; } }

    select.type { background:transparent; border:1px solid rgba(0,255,0,0.12); color:var(--neon-green); padding:10px 12px; border-radius:8px; font-family:var(--mono); font-size:13px; outline:none; }
    button.scan { background:linear-gradient(180deg, rgba(0,255,0,0.06), rgba(0,255,0,0.02)); border:1px solid rgba(0,255,0,0.12); color:var(--neon-green); padding:10px 12px; border-radius:8px; cursor:pointer; font-family:var(--mono); transition: transform 120ms ease; }
    button.scan:active { transform:translateY(1px) scale(.997); }
    button.scan[disabled] { opacity:0.45; cursor:not-allowed; }

    /* small status row */
    .status-row { display:flex; gap:8px; align-items:center; color:rgba(0,255,0,0.45); font-size:12px; margin-top:4px; }
    .spinner { width:12px; height:12px; border-radius:50%; border:2px solid rgba(0,255,0,0.12); border-top-color:var(--neon-green); animation: spin 800ms linear infinite; display:none; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* results */
    .results { margin-top:6px; background: rgba(0,0,0,0.55); border:1px solid rgba(0,255,0,0.06); padding:8px; border-radius:8px; height:0; overflow:auto; transition: height 360ms ease; font-size:13px; display:flex; flex-direction:column; gap:6px; }
    .card.expanded .results, .card:hover .results { height:220px; }
    .result-item { padding:8px; border-radius:6px; display:flex; gap:10px; align-items:center; color:var(--neon-green); background:transparent; transition: background 140ms ease, transform 140ms ease; outline:none; }
    .result-item[aria-selected="true"] { background: rgba(0,255,0,0.06); transform:translateX(2px); }
    .result-item .meta { color:rgba(0,255,0,0.6); font-size:12px; min-width:90px; }
    .result-item .desc { color:rgba(0,255,0,0.38); font-size:12px; }
    .result-top { display:flex; gap:8px; align-items:center; width:100%; justify-content:space-between; }
    .avatar { width:36px; height:36px; border-radius:8px; object-fit:cover; border:1px solid rgba(0,255,0,0.06); }

    /* contact */
    .contact { margin-top:auto; display:flex; align-items:center; gap:8px; justify-content:space-between; }
    .email { color:var(--neon-green); font-size:13px; padding:8px 10px; border-radius:8px; border:1px solid rgba(0,255,0,0.08); background:rgba(0,0,0,0.4); }
    .copy { background:transparent; border:1px solid rgba(0,255,0,0.12); color:var(--neon-green); padding:8px 10px; border-radius:8px; cursor:pointer; font-family:var(--mono); }

    .toast { position:absolute; right:12px; bottom:12px; background: rgba(0,0,0,0.9); color:var(--neon-green); padding:8px 12px; border-radius:8px; border:1px solid rgba(0,255,0,0.06); box-shadow: 0 4px 20px rgba(0,0,0,0.6); display:none; font-size:13px; }

    /* ERROR / glitch */
    .card.glitch { animation: glitch-wild 800ms linear infinite; border-color: rgba(255,0,0,0.95); }
    .card.glitch::before { box-shadow: 0 0 56px rgba(255,0,0,0.28), 0 0 160px rgba(255,0,0,0.12); }
    @keyframes glitch-wild {
      0% { transform: translate3d(0,0,0) rotate(0deg) scale(1); }
      10% { transform: translate3d(-8px,2px,0) rotate(-1deg) scale(1.02); }
      20% { transform: translate3d(8px,-6px,0) rotate(1deg) scale(0.98); }
      40% { transform: translate3d(-10px,8px,0) rotate(-1.4deg) scale(1.05); }
      60% { transform: translate3d(6px,-8px,0) rotate(1.6deg) scale(0.97); }
      80% { transform: translate3d(-2px,4px,0) rotate(-0.4deg) scale(1.01); }
      100% { transform: translate3d(0,0,0) rotate(0deg) scale(1); }
    }

    /* small responsive */
    @media (max-width:900px) {
      .card, .card.expanded, .card:hover { width:calc(100% - 48px); height:auto; max-height:80vh; }
      .card.expanded .results, .card:hover .results { height:220px; }
    }

    /* accessibility focus */
    .card :focus { outline:2px dashed rgba(0,255,0,0.12); outline-offset:4px; }
    .hint { color:rgba(0,255,0,0.28); font-size:12px; }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>

  <div class="center" id="center">
    <div class="card" id="card" role="region" aria-label="Interactive search card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div class="header" aria-hidden="false">
          <div class="typer" id="typer" aria-hidden="true"></div>
          <div class="hint" style="margin-left:8px">/ to focus • Esc to reset</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="authToggle" class="scan" title="Toggle optional token auth" aria-label="Toggle auth">AUTH</button>
        </div>
      </div>

      <div class="controls" role="search" aria-label="Live GitHub search">
        <div class="input-wrap">
          <div class="block-caret" aria-hidden="true"></div>
          <input id="searchInput" class="search with-caret" placeholder="scan query... (try: electron, react, sprocketi777)" aria-label="Search GitHub" autocomplete="off" />
        </div>
        <select id="searchType" class="type" aria-label="Search type">
          <option value="all">All</option>
          <option value="repositories">Repositories</option>
          <option value="users">Users/Profiles</option>
        </select>
        <button id="scanBtn" class="scan" aria-label="Scan GitHub">SCAN</button>
      </div>

      <div class="status-row" aria-hidden="false" id="statusRow">
        <div class="spinner" id="spinner" aria-hidden="true"></div>
        <div id="statusText">idle</div>
        <div style="margin-left:auto;color:rgba(0,255,0,0.28);font-size:12px" id="rateInfo"></div>
      </div>

      <div class="results" id="results" role="list" aria-label="Search results (top 5)"></div>

      <div style="display:flex;gap:8px;flex-direction:column;margin-top:6px">
        <div style="display:flex;gap:8px;align-items:center">
          <input id="tokenInput" placeholder="Optional GitHub token (session only)" style="flex:1;padding:8px;border-radius:8px;background:transparent;border:1px solid rgba(0,255,0,0.06);color:var(--neon-green);display:none" aria-label="GitHub token" />
          <button id="saveToken" class="scan" style="display:none">SAVE</button>
        </div>
      </div>

      <div class="contact">
        <div class="email" id="emailText">EMAIL: sprocket1777@protonmail.com</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button id="copyBtn" class="copy" aria-label="Copy email to clipboard">COPY</button>
        </div>
      </div>

      <div class="toast" id="toast" role="status" aria-live="polite">SUCCESS</div>
    </div>
  </div>

  <script>
    /* ----------------------
       MatrixRain - realistic code fragments, multi-length streams
       ---------------------- */
    class MatrixRain {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d', { alpha: true });

        // curated snippets (longer strings + symbols). We keep as an array for easier indexing.
        this.pool = [
`function init(){const el=document.getElementById('app');for(let i=0;i<10;i++){console.log(i);} }`,
`async function fetchData(url){try{const res=await fetch(url);return await res.json();}catch(e){console.error(e);} }`,
`<div class="card"> ... </div>`,
`#container { display:flex; gap:8px; align-items:center; }`,
`let i = 0; while(i < n) { i++; }`,
`const handler = e => { e.preventDefault(); return false; }`,
`fetch('/api/data').then(r => r.json()).catch(err => console.error(err));`,
`class App { constructor(){ this.state = {} } render(){ return '<div/>' } }`,
`=> === !== == <= >= ++ -- && || |>`,
`0xFF, 0b1010, 12345, true, false, null`,
`/* TODO: optimize path */`,
`setTimeout(()=>{ requestAnimationFrame(loop); }, 1000);`,
`map.filter.reduce((a,b)=>a+b,0)`,
`document.querySelectorAll('.result-item')`,
`console.log('%cTRACE','color:#0f0')`,
`function* gen(){ yield 1; yield 2; }`,
`style="color:#0f0;background:#000"`,
`@media (max-width:900px) { display:block; }`,
`export default async function main(){ await init(); }`,
`if(user){ show(user.name) } else { login() }`,
`return typeof v === 'string' ? v.slice(0,10) : null`,
`for(const k in obj){ if(obj.hasOwnProperty(k)) console.log(k) }`,
`try{ doWork() } catch(err){ throw err } finally{ cleanup() }`,
`<input type="text" name="q" />`,
`const node = document.createElement('div'); node.className='item'`,
`(()=>{ /* iife */ })();`,
`JSON.stringify({a:1,b:2}, null, 2);`,
`/regex/gi.test(str)`,
`await Promise.all(tasks.map(t=>t()))`,
`new Uint8Array(1024)`,
`<a href="https://github.com">repo</a>`,
`border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.6);`,
`document.addEventListener('click', handler, {passive:true})`,
`const PI = Math.PI; Math.sin(x) * 2`,
`/* security: do not commit tokens */`
        ];

        // flattened string used for substring sampling to create flowing fragments
        this.codePool = this.pool.join('  |  ');

        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.dpr = Math.max(1, window.devicePixelRatio || 1);
        this.columnSize = 14; // pixel size
        this.columns = Math.floor(this.width / this.columnSize);
        this.drops = new Array(this.columns).fill(0);
        this.color = '#00FF00';
        this.secondary = '#008000';
        this.speedMultiplier = 1;
        this.running = true;
        this.lastTime = performance.now();
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.loop = this.loop.bind(this);
        requestAnimationFrame(this.loop);
      }

      resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = Math.floor(this.width * this.dpr);
        this.canvas.height = Math.floor(this.height * this.dpr);
        this.canvas.style.width = this.width + 'px';
        this.canvas.style.height = this.height + 'px';
        this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
        this.columns = Math.max(2, Math.floor(this.width / this.columnSize));
        this.drops = new Array(this.columns).fill(0).map(() => Math.random() * this.height / this.columnSize);
        this.ctx.font = `${this.columnSize}px ${getComputedStyle(document.documentElement).getPropertyValue('--mono') || 'monospace'}`;
        this.ctx.textBaseline = 'top';
      }

      setState(state) {
        if (state === 'normal') {
          this.color = '#00FF00'; this.secondary = '#008000'; this.speedMultiplier = 1;
        } else if (state === 'fast') {
          this.color = '#00FF00'; this.secondary = '#008000'; this.speedMultiplier = 4.8;
        } else if (state === 'error') {
          this.color = '#FF0000'; this.secondary = '#8B0000'; this.speedMultiplier = 1;
        }
      }

      // sample a variable-length fragment, prefer whole tokens
      getFragment() {
        const pool = this.codePool;
        const maxLen = 18;
        const minLen = 3;
        const len = Math.floor(Math.random() * (maxLen - minLen + 1)) + minLen;
        // pick a start near token boundaries for more meaningful fragments
        const start = Math.floor(Math.random() * Math.max(1, pool.length - len));
        let frag = pool.substr(start, len);
        // trim leading/trailing spaces, collapse whitespace
        frag = frag.replace(/\s+/g, ' ').trim();
        if (!frag) return 'const ';
        return frag.length > 0 ? frag : 'const ';
      }

      loop(now) {
        if (!this.running) return;
        const dt = now - this.lastTime;
        this.lastTime = now;
        const ctx = this.ctx;
        // trail
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        ctx.fillRect(0, 0, this.width, this.height);

        for (let i = 0; i < this.columns; i++) {
          const x = i * this.columnSize;
          const y = this.drops[i] * this.columnSize;
          const fragment = this.getFragment();
          const alpha = Math.random() * 0.9 + 0.1;

          if (this.color === '#FF0000') {
            // chaotic red
            const chaoticSpeed = (Math.random() * 16 + 6) * (this.dpr * 0.6);
            ctx.shadowBlur = Math.floor(Math.random() * 20) + 8;
            ctx.shadowColor = this.secondary;
            ctx.fillStyle = this.color;
            ctx.globalAlpha = Math.min(1, alpha + 0.3);
            ctx.fillText(fragment, x, y);
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            this.drops[i] += chaoticSpeed * (dt / 16);
            if (Math.random() < 0.03) this.drops[i] = -Math.random() * 20;
            if (this.drops[i] * this.columnSize > this.height && Math.random() > 0.7) this.drops[i] = Math.random() * 2;
          } else {
            // green normal/fast
            const speed = (1.2 + (i % 7) * 0.5) * this.speedMultiplier * (this.dpr * 0.6);
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.globalAlpha = Math.min(1, alpha + 0.2);
            ctx.fillText(fragment, x, y);
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            this.drops[i] += speed * (dt / 16);
            if (this.drops[i] * this.columnSize > this.height) {
              if (Math.random() > 0.98) this.drops[i] = 0;
              else this.drops[i] = Math.random() * 1.2;
            }
          }
        }

        requestAnimationFrame(this.loop);
      }
    }

    /* ----------
       Typer header
       ---------- */
    class Typer {
      constructor(el, phrases) {
        this.el = el;
        this.phrases = phrases;
        this.i = 0; this.ch = 0; this.dir = 1; this.delay = 60; this.pause = 900; this.t = null; this.start();
      }
      start(){ this.t = setTimeout(()=>this.tick(), 200); }
      stop(){ clearTimeout(this.t); this.t=null; }
      reset(){ this.stop(); this.i=0; this.ch=0; this.dir=1; this.el.textContent=''; this.start(); }
      tick(){
        const p = this.phrases[this.i];
        if (this.dir === 1){
          this.ch++; this.el.textContent = p.slice(0,this.ch);
          if (this.ch === p.length){ this.dir = -1; this.t = setTimeout(()=>this.tick(), this.pause); return; }
        } else {
          this.ch--; this.el.textContent = p.slice(0,this.ch);
          if (this.ch === 0){ this.dir=1; this.i = (this.i+1)%this.phrases.length; }
        }
        const jitter = Math.max(30, this.delay + Math.random()*80 - 40);
        this.t = setTimeout(()=>this.tick(), jitter);
      }
    }

    /* ----------
       Utilities
       ---------- */
    function $(id){ return document.getElementById(id); }
    function debounce(fn, wait){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); }; }
    function el(tag, attrs={}, ...children){ const e=document.createElement(tag); Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v)); children.forEach(c=>{ if(typeof c==='string') e.appendChild(document.createTextNode(c)); else if(c) e.appendChild(c); }); return e; }

    /* ----------
       App init
       ---------- */
    (function(){
      const canvas = $('matrix');
      const rain = new MatrixRain(canvas);
      const typer = new Typer($('typer'), [
        'SYSTEM_OVERRIDE // SPROCKET',
        'LIVE_SCAN // ONLINE',
        'NEURAL_LINK // ACTIVE',
        'TRACER // ENGAGED'
      ]);

      const card = $('card');
      const input = $('searchInput');
      const typeSel = $('searchType');
      const scanBtn = $('scanBtn');
      const resultsEl = $('results');
      const spinner = $('spinner');
      const statusText = $('statusText');
      const rateInfo = $('rateInfo');
      const copyBtn = $('copyBtn');
      const toast = $('toast');
      const authToggle = $('authToggle');
      const tokenInput = $('tokenInput');
      const saveToken = $('saveToken');

      // Token handling (sessionStorage)
      const TOKEN_KEY = 'gh_token_session';
      function getToken(){ return sessionStorage.getItem(TOKEN_KEY) || ''; }
      function setToken(t){ if(t) sessionStorage.setItem(TOKEN_KEY, t); else sessionStorage.removeItem(TOKEN_KEY); }

      // initialize token field if present
      const existingToken = getToken();
      if(existingToken){
        tokenInput.value = existingToken;
        tokenInput.style.display = '';
        saveToken.style.display = '';
        authToggle.classList.add('active');
      }

      // auth toggle
      authToggle.addEventListener('click', ()=> {
        const visible = tokenInput.style.display === '' || tokenInput.style.display === 'block';
        tokenInput.style.display = visible ? 'none' : 'block';
        saveToken.style.display = visible ? 'none' : 'inline-block';
      });
      saveToken.addEventListener('click', ()=> {
        const val = tokenInput.value.trim();
        setToken(val);
        showToast(val ? 'TOKEN SAVED (session)' : 'TOKEN CLEARED');
      });

      // spinner and status
      function setBusy(b, text='') {
        spinner.style.display = b ? 'inline-block' : 'none';
        statusText.textContent = text || (b ? 'scanning…' : 'idle');
      }
      function setRateInfo(s){ rateInfo.textContent = s || ''; }

      // keyboard shortcuts
      document.addEventListener('keydown', (e)=>{
        // "/" focuses search unless inside an input
        if(e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){
          e.preventDefault();
          input.focus();
          input.select();
          return;
        }
        if(e.key === 'Escape'){
          collapseAndReset();
        }
      });

      // expand/contract interactions
      card.addEventListener('mouseenter', ()=> rain.setState('fast'));
      card.addEventListener('mouseleave', ()=> { if(!card.classList.contains('expanded')) { rain.setState('normal'); resetUI(); } });

      card.addEventListener('click', (e)=>{
        if([input, scanBtn, copyBtn, authToggle, saveToken].includes(e.target) || e.target.closest('.result-item')) return;
        if(window.matchMedia('(hover: none)').matches || window.innerWidth < 900){
          card.classList.toggle('expanded');
          if(card.classList.contains('expanded')) { rain.setState('fast'); input.focus(); }
          else { rain.setState('normal'); resetUI(); }
        }
      });

      document.addEventListener('click', (e)=>{
        if(!card.contains(e.target) && card.classList.contains('expanded')) {
          card.classList.remove('expanded');
          rain.setState('normal');
          resetUI();
        }
      });

      // copy email
      copyBtn.addEventListener('click', async ()=>{
        try { await navigator.clipboard.writeText('sprocket1777@protonmail.com'); showToast('SUCCESS: COPIED'); }
        catch(e){ showToast('FAILED'); }
      });

      function showToast(msg='OK', ms=2000){
        toast.textContent = msg; toast.style.display = 'block';
        setTimeout(()=>{ toast.style.display = 'none'; }, ms);
      }

      /* ------------------
         Search & GitHub API
         ------------------ */
      const GITHUB_API = 'https://api.github.com';
      let controller = null;
      let selectedIndex = -1;
      let lastResults = [];

      async function apiFetch(url){
        const headers = { 'Accept': 'application/vnd.github+json' };
        const token = getToken();
        if(token) headers['Authorization'] = 'token ' + token;
        const res = await fetch(url, { headers, signal: controller ? controller.signal : undefined });
        // update rate info if present
        try {
          const rl = res.headers.get('x-ratelimit-remaining');
          const reset = res.headers.get('x-ratelimit-reset');
          if(rl) {
            const r = parseInt(rl,10);
            if(reset) {
              const resetAgo = Math.max(0, Math.floor((parseInt(reset,10)*1000 - Date.now())/1000));
              setRateInfo(`${r} • reset:${Math.max(0, Math.ceil(resetAgo/60))}m`);
            } else setRateInfo(String(r));
          }
        } catch(e){}
        if(!res.ok) throw new Error('API ' + res.status);
        return res.json();
      }

      async function doSearch(query, type='all'){
        if(!query || !query.trim()) { resultsEl.innerHTML=''; lastResults=[]; selectedIndex=-1; return; }
        // abort previous
        if(controller) controller.abort();
        controller = new AbortController();

        setBusy(true, 'scanning…');
        statusText.textContent = 'scanning…';
        selectedIndex = -1;
        lastResults = [];
        resultsEl.innerHTML = '';

        try {
          const results = [];
          if(type === 'repositories' || type === 'all'){
            const url = `${GITHUB_API}/search/repositories?q=${encodeURIComponent(query)}&per_page=5`;
            const data = await apiFetch(url);
            (data.items || []).slice(0,5).forEach(r => results.push({ kind:'repo', name: r.full_name, desc:r.description, url:r.html_url, stars:r.stargazers_count, lang:r.language }));
          }
          if(type === 'users' || type === 'all'){
            const url = `${GITHUB_API}/search/users?q=${encodeURIComponent(query)}&per_page=5`;
            const data = await apiFetch(url);
            (data.items || []).slice(0,5).forEach(u => results.push({ kind:'user', name:u.login, avatar:u.avatar_url, url:u.html_url }));
          }
          // combine for 'all' with simple priority
          let final = results;
          if(type === 'all') final = results.filter(r=>r.kind==='repo').slice(0,3).concat(results.filter(r=>r.kind==='user').slice(0,2)).slice(0,5);

          if(!final.length){
            triggerError('no results');
            renderNoResults();
            return;
          }
          renderResults(final);
        } catch(err){
          if(err.name === 'AbortError') return;
          console.error(err);
          triggerError('api error');
          renderError(err);
        } finally {
          setBusy(false, '');
        }
      }

      const debouncedSearch = debounce((q,t)=>doSearch(q,t), 380);
      input.addEventListener('input', (e)=> {
        const q = e.target.value;
        debouncedSearch(q, typeSel.value);
        scanBtn.disabled = q.trim().length === 0;
      });
      input.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter'){ doSearch(input.value, typeSel.value); return; }
        // navigation
        if(e.key === 'ArrowDown' || e.key === 'ArrowUp'){
          e.preventDefault();
          if(lastResults.length === 0) return;
          if(e.key === 'ArrowDown') selectedIndex = Math.min(lastResults.length - 1, selectedIndex + 1);
          else selectedIndex = Math.max(0, selectedIndex - 1);
          updateSelection();
        }
      });

      scanBtn.addEventListener('click', ()=> doSearch(input.value, typeSel.value));

      function renderResults(list){
        card.classList.remove('glitch');
        rain.setState('fast');
        resultsEl.innerHTML = '';
        lastResults = list;
        selectedIndex = -1;
        list.forEach((it, idx)=>{
          const row = document.createElement('div');
          row.className = 'result-item';
          row.tabIndex = 0;
          row.setAttribute('role','listitem');
          row.dataset.index = idx;
          row.innerHTML = `
            <div style="display:flex;gap:8px;align-items:center;flex:1">
              ${it.avatar ? `<img class="avatar" src="${it.avatar}" alt="${it.name} avatar">` : '<div style="width:36px;height:36px;border-radius:6px;background:rgba(0,255,0,0.04);display:inline-block"></div>'}
              <div style="flex:1">
                <div style="display:flex;gap:8px;align-items:center">
                  <div style="font-weight:700">${escapeHtml(it.name)}</div>
                  <div class="meta">${it.kind.toUpperCase()}</div>
                </div>
                <div class="desc">${escapeHtml(it.desc || (it.lang ? (it.lang + (it.stars ? (' • ★' + it.stars) : '')) : ''))}</div>
              </div>
            </div>
            <div style="min-width:70px;text-align:right;color:rgba(0,255,0,0.28)">${it.kind==='repo' && it.stars ? '★ '+it.stars : ''}</div>
          `;
          // click opens
          row.addEventListener('click', ()=> window.open(it.url, '_blank', 'noopener'));
          row.addEventListener('keydown', (e)=> {
            if(e.key === 'Enter') window.open(it.url, '_blank', 'noopener');
          });
          resultsEl.appendChild(row);
        });
      }

      function updateSelection(){
        const nodes = resultsEl.querySelectorAll('.result-item');
        nodes.forEach(n => n.setAttribute('aria-selected', 'false'));
        if(selectedIndex >= 0 && nodes[selectedIndex]){
          nodes[selectedIndex].setAttribute('aria-selected', 'true');
          nodes[selectedIndex].focus({preventScroll:true});
        }
      }

      function renderNoResults(){
        resultsEl.innerHTML = `<div style="color:var(--blood-red);padding:10px">NO RESULTS — try broader terms or check spelling.</div>`;
      }
      function renderError(err){
        resultsEl.innerHTML = `<div style="color:var(--blood-red);padding:10px">API ERROR: ${escapeHtml(err.message||err.toString())}</div>`;
      }

      function triggerError(msg){
        card.classList.add('glitch');
        rain.setState('error');
        setBusy(false,'');
      }
