<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SYSTEM_OVERRIDE // SPROCKET</title>
  <meta name="description" content="this is my website, enjoy" />
  <style>
    :root{
      --bg:#000000;
      --mono: "Courier New", Courier, monospace;
      --neon-green: #00FF00;
      --neon-green-dark: #008000;
      --blood-red: #FF0000;
      --deep-crimson: #8B0000;
      --card-bg: rgba(0,0,0,0.6);
      --glass: rgba(0, 0, 0, 0.5);
      --glass-border: rgba(0,255,0,0.14);
      --z-canvas: 1;
      --z-ui: 10;
    }

    /* Reset */
    * { box-sizing: border-box; margin:0; padding:0; }
    html,body { height:100%; background:var(--bg); font-family:var(--mono); color:var(--neon-green); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    /* Fullscreen canvas background */
    canvas#matrix {
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:var(--z-canvas);
      pointer-events:none; /* allow clicks through */
      background:transparent;
    }

    /* Center container */
    .center {
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:var(--z-ui);
      padding:24px;
    }

    /* Card base */
    .card {
      width:360px;
      height:120px;
      max-width:calc(100% - 48px);
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.45));
      border:1px solid rgba(0,255,0,0.14);
      box-shadow: 0 0 24px rgba(0,255,0,0.06), 0 4px 40px rgba(0,0,0,0.6), inset 0 0 8px rgba(0,255,0,0.02);
      backdrop-filter: blur(6px);
      border-radius:12px;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      transition: width 420ms cubic-bezier(.2,.9,.2,1), height 420ms cubic-bezier(.2,.9,.2,1), transform 360ms ease, box-shadow 260ms ease;
      overflow:hidden;
      cursor:default;
      position:relative;
    }

    /* glowing border */
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:12px;
      pointer-events:none;
      box-shadow: 0 0 28px rgba(0,255,0,0.18), 0 0 80px rgba(0,255,0,0.06), 0 0 2px rgba(0,255,0,0.2) inset;
      transition: box-shadow 260ms ease, border-color 260ms ease;
    }

    /* Expanded (desktop hover) */
    @media (hover: hover) {
      .card:hover {
        width:860px;
        height:520px;
        transform:translateY(-6px);
        box-shadow: 0 0 46px rgba(0,255,0,0.22), 0 10px 80px rgba(0,0,0,0.6);
      }
      .card:hover::before {
        box-shadow: 0 0 66px rgba(0,255,0,0.28), 0 0 140px rgba(0,255,0,0.12);
      }
    }

    /* Expanded class for mobile tap toggle */
    .card.expanded {
      width:860px;
      height:520px;
      transform:translateY(-6px);
      box-shadow: 0 0 46px rgba(0,255,0,0.22), 0 10px 80px rgba(0,0,0,0.6);
    }
    .card.expanded::before {
      box-shadow: 0 0 66px rgba(0,255,0,0.28), 0 0 140px rgba(0,255,0,0.12);
    }

    /* Header (typing) */
    .header {
      font-size:20px;
      letter-spacing:1px;
      color:var(--neon-green);
      text-shadow: 0 0 8px rgba(0,255,0,0.15), 0 0 24px rgba(0,255,0,0.04);
      white-space:nowrap;
      overflow:hidden;
      display:flex;
      align-items:center;
      gap:14px;
    }

    .header .title {
      display:inline-block;
      min-width:220px;
    }

    /* Typing caret for header */
    .typer {
      font-weight:700;
    }

    /* Search area */
    .controls {
      display:flex;
      gap:8px;
      align-items:center;
    }
    .input-wrap {
      position:relative;
      flex:1;
      min-width:80px;
    }
    input.search {
      width:100%;
      background:transparent;
      border:1px solid rgba(0,255,0,0.12);
      color:var(--neon-green);
      padding:12px 14px;
      border-radius:8px;
      outline:none;
      box-shadow: inset 0 -8px 24px rgba(0,0,0,0.6);
      font-family:var(--mono);
      font-size:14px;
      caret-color:var(--neon-green);
      transition: box-shadow 160ms ease, border 160ms ease;
    }

    /* terminal block cursor effect */
    input.search::selection { background: rgba(0,255,0,0.12); }
    .input-wrap .block-caret {
      position:absolute;
      top:50%;
      left:12px;
      transform:translateY(-50%);
      width:8px;
      height:18px;
      background:transparent;
      border-left:2px solid var(--neon-green);
      animation: blinkCaret 1s steps(2,start) infinite;
      pointer-events:none;
      mix-blend-mode:screen;
    }
    input.search.with-caret { padding-left:28px; }

    @keyframes blinkCaret {
      0% { opacity:1; }
      50% { opacity:0; }
      100% { opacity:1; }
    }

    select.type {
      background:transparent;
      border:1px solid rgba(0,255,0,0.12);
      color:var(--neon-green);
      padding:10px 12px;
      border-radius:8px;
      font-family:var(--mono);
      font-size:13px;
      outline:none;
    }

    button.scan {
      background:linear-gradient(180deg, rgba(0,255,0,0.06), rgba(0,255,0,0.02));
      border:1px solid rgba(0,255,0,0.12);
      color:var(--neon-green);
      padding:10px 12px;
      border-radius:8px;
      cursor:pointer;
      font-family:var(--mono);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }
    button.scan:active { transform:translateY(1px) scale(.997); }

    /* Results terminal list */
    .results {
      margin-top:6px;
      background: rgba(0,0,0,0.55);
      border:1px solid rgba(0,255,0,0.06);
      padding:12px;
      border-radius:8px;
      height:0;
      overflow:auto;
      transition: height 360ms ease;
      font-size:13px;
    }

    .card.expanded .results, .card:hover .results {
      height:220px;
    }

    .result-item {
      padding:8px 6px;
      border-bottom:1px dashed rgba(0,255,0,0.05);
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--neon-green);
      text-decoration:none;
    }
    .result-item:last-child { border-bottom:0; }
    .result-item .meta { color:rgba(0,255,0,0.6); font-size:12px; min-width:110px; }
    .result-item:hover { background: rgba(0,255,0,0.02); }

    /* scroll bar */
    .results::-webkit-scrollbar { height:8px; width:8px; }
    .results::-webkit-scrollbar-thumb { background: rgba(0,255,0,0.12); border-radius:8px; }
    .results::-webkit-scrollbar-track { background: transparent; }

    /* contact */
    .contact {
      margin-top:auto;
      display:flex;
      align-items:center;
      gap:8px;
      justify-content:space-between;
    }
    .contact .email {
      color:var(--neon-green);
      font-size:13px;
      padding:8px 10px;
      border-radius:8px;
      border:1px solid rgba(0,255,0,0.08);
      background:rgba(0,0,0,0.4);
    }
    .contact button.copy {
      background:transparent;
      border:1px solid rgba(0,255,0,0.12);
      color:var(--neon-green);
      padding:8px 10px;
      border-radius:8px;
      cursor:pointer;
      font-family:var(--mono);
    }

    .toast {
      position:absolute;
      right:12px;
      bottom:12px;
      background: rgba(0,0,0,0.8);
      color:var(--neon-green);
      padding:8px 12px;
      border-radius:8px;
      border:1px solid rgba(0,255,0,0.06);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      display:none;
      font-size:13px;
    }

    /* ERROR / NO RESULTS - glitch animations & red border */
    .card.glitch {
      animation: glitch-wild 800ms linear infinite;
      border-color: rgba(255,0,0,0.9);
    }
    .card.glitch::before {
      box-shadow: 0 0 36px rgba(255,0,0,0.28), 0 0 140px rgba(255,0,0,0.12);
    }
    @keyframes glitch-wild {
      0% { transform: translate3d(0,0,0) rotate(0deg) scale(1); filter: hue-rotate(0deg); }
      10% { transform: translate3d(-6px,2px,0) rotate(-0.8deg) scale(1.02); }
      20% { transform: translate3d(6px,-4px,0) rotate(0.6deg) scale(0.99); }
      30% { transform: translate3d(-8px,6px,0) rotate(-1.2deg) scale(1.05); }
      45% { transform: translate3d(6px,-8px,0) rotate(1.6deg) scale(0.98); }
      60% { transform: translate3d(-2px,3px,0) rotate(-0.4deg) scale(1.01); }
      75% { transform: translate3d(3px,-2px,0) rotate(0.3deg) scale(1.03); }
      100% { transform: translate3d(0,0,0) rotate(0deg) scale(1); }
    }

    /* small responsive tweaks */
    @media (max-width:900px) {
      .card, .card.expanded, .card:hover { width:calc(100% - 48px); height:auto; max-height:80vh; }
      .card.expanded .results, .card:hover .results { height:220px; }
    }

    /* small helper */
    a.result-item { color:inherit; text-decoration:none; display:flex; flex-direction:row; align-items:center; gap:10px; }
    .avatar { width:32px; height:32px; border-radius:6px; object-fit:cover; border:1px solid rgba(0,255,0,0.06); }

    /* accessible focus */
    .card :focus { outline:2px dashed rgba(0,255,0,0.12); outline-offset:4px; }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>

  <div class="center" id="center">
    <div class="card" id="card" role="region" aria-label="Interactive search card">
      <div class="header" aria-hidden="false">
        <div class="title">
          <span class="typer" id="typer" aria-hidden="true"></span>
        </div>
      </div>

      <div class="controls" role="search" aria-label="Live GitHub search">
        <div class="input-wrap">
          <div class="block-caret" aria-hidden="true"></div>
          <input id="searchInput" class="search with-caret" placeholder="scan query..." aria-label="Search GitHub" />
        </div>
        <select id="searchType" class="type" aria-label="Search type">
          <option value="all">All</option>
          <option value="repositories">Repositories</option>
          <option value="users">Users/Profiles</option>
        </select>
        <button id="scanBtn" class="scan" aria-label="Scan GitHub">SCAN</button>
      </div>

      <div class="results" id="results" role="list" aria-label="Search results (top 5)"></div>

      <div class="contact">
        <div class="email" id="emailText">EMAIL: sprocket1777@protonmail.com</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button id="copyBtn" class="copy" aria-label="Copy email to clipboard">COPY</button>
        </div>
      </div>

      <div class="toast" id="toast" role="status" aria-live="polite">SUCCESS: COPIED</div>
    </div>
  </div>

  <script>
    /* ===========
       Matrix Rain
       =========== */
    class MatrixRain {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d', { alpha: true });
        // Use a selection of short real code snippets so the falling characters form readable code streaks
        this.snippets = [
          'function greet(name) {\n  console.log(`Hello, ${name}!`);\n}',
          'const add = (a, b) => a + b;',
          '<div class="card">\n  <h3>Title</h3>\n</div>',
          'body {\n  background: #000;\n  color: #0f0;\n}',
          'import React from "react";\nexport default App;',
          'for (let i = 0; i < n; i++) {\n  process(i);\n}',
          'if (err) {\n  throw err;\n}',
          'const data = await fetch(url).then(r=>r.json());',
          '// TODO: refactor this into smaller functions',
          'console.log("sprocket // live")'
        ];

        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.dpr = Math.max(1, window.devicePixelRatio || 1);
        this.columnSize = 16; // font size (px) for the rain
        this.columns = Math.floor(this.width / this.columnSize);
        this.drops = new Array(this.columns).fill(0);
        // Map each column to a snippet index so columns show consistent streams
        this.snippetMap = new Array(this.columns).fill(0).map(() => Math.floor(Math.random() * this.snippets.length));
        this.color = '#00FF00';
        this.secondary = '#008000';
        this.speedMultiplier = 1;
        this.running = true;
        this.lastTime = performance.now();
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.loop = this.loop.bind(this);
        requestAnimationFrame(this.loop);
      }

      resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = Math.floor(this.width * this.dpr);
        this.canvas.height = Math.floor(this.height * this.dpr);
        this.canvas.style.width = this.width + 'px';
        this.canvas.style.height = this.height + 'px';
        this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
        this.columns = Math.max(2, Math.floor(this.width / this.columnSize));
        this.drops = new Array(this.columns).fill(0).map(() => Math.random() * this.height / this.columnSize);
        // re-map snippets if columns changed
        this.snippetMap = new Array(this.columns).fill(0).map(() => Math.floor(Math.random() * this.snippets.length));
        this.ctx.font = `${this.columnSize}px ${getComputedStyle(document.documentElement).getPropertyValue('--mono') || 'monospace'}`;
      }

      setState(state) {
        // states: normal, fast, error
        if (state === 'normal') {
          this.color = '#00FF00';
          this.secondary = '#008000';
          this.speedMultiplier = 1;
        } else if (state === 'fast') {
          this.color = '#00FF00';
          this.secondary = '#008000';
          this.speedMultiplier = 4.2;
        } else if (state === 'error') {
          this.color = '#FF0000';
          this.secondary = '#8B0000';
          this.speedMultiplier = 1; // chaotic handled below
        }
      }

      drawChar(x, y, ch, alpha, glowColor) {
        const ctx = this.ctx;
        ctx.fillStyle = glowColor;
        ctx.globalAlpha = alpha * 0.25;
        ctx.fillText(ch, x, y);
        // sharp glow
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#fff'; // bright core for contrast
        ctx.fillText(ch, x, y);
        ctx.globalAlpha = 1;
      }

      loop(now) {
        if (!this.running) return;
        const dt = now - this.lastTime;
        this.lastTime = now;
        const ctx = this.ctx;
        // faded background for trailing effect
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        ctx.fillRect(0, 0, this.width, this.height);

        for (let i = 0; i < this.columns; i++) {
          const x = i * this.columnSize;
          let y = this.drops[i] * this.columnSize;

          // choose a character from the assigned snippet so streams form real code
          const snippet = this.snippets[this.snippetMap[i]] || this.snippets[0];
          // compute an index based on vertical position so characters progress down the stream
          const charIndex = Math.floor(this.drops[i]) % Math.max(1, snippet.length);
          let ch = snippet.charAt(charIndex);
          // ensure we don't render stray newlines; replace with a visible placeholder or space
          if (ch === '\n' || ch === '\r') ch = ' ';

          // pick alpha based on position
          const alpha = 0.8 - (Math.random() * 0.45);

          // error state: chaotic speed and red glow
          if (this.color === '#FF0000') {
            const chaoticSpeed = (Math.random() * 10 + 4) * (this.dpr * 0.6);
            this.drawChar(x, y, ch, alpha, this.secondary);
            this.drops[i] += chaoticSpeed * (dt/16);
            // occasionally remap snippet for a glitchy look
            if (Math.random() < 0.02) this.snippetMap[i] = Math.floor(Math.random() * this.snippets.length);
            if (this.drops[i] * this.columnSize > this.height && Math.random() > 0.85) {
              this.drops[i] = -Math.random() * 20;
            }
          } else {
            // normal/fast
            const speed = (2 + (i % 5) * 0.6) * this.speedMultiplier * (this.dpr * 0.6);
            // glow color gradient
            const glow = this.color;
            this.ctx.shadowBlur = 14;
            this.ctx.shadowColor = glow;
            // render a slightly larger white core for readability on dark backgrounds
            this.ctx.fillStyle = glow;
            this.ctx.fillText(ch, x, y);
            this.ctx.shadowBlur = 0;
            this.drops[i] += speed * (dt/16);
            // occasionally advance the snippet mapping so streams vary over time
            if (Math.random() < 0.002) this.snippetMap[i] = Math.floor(Math.random() * this.snippets.length);
            if (this.drops[i] * this.columnSize > this.height) {
              if (Math.random() > 0.975) {
                this.drops[i] = 0;
              } else {
                this.drops[i] = Math.random() * 1.2;
              }
            }
          }
        }

        requestAnimationFrame(this.loop);
      }
    }

    /* ===========
       Typing header
       =========== */
    class Typer {
      constructor(element, phrases = []) {
        this.el = element;
        this.phrases = phrases;
        this.index = 0;
        this.ch = 0;
        this.direction = 1; // 1 typing, -1 deleting
        this.delay = 80;
        this.pauseAfter = 900;
        this.timer = null;
        this.running = true;
        this.start();
      }
      start() {
        this.running = true;
        this.tick();
      }
      stop() {
        this.running = false;
        if (this.timer) clearTimeout(this.timer);
      }
      reset() {
        this.stop();
        this.index = 0;
        this.ch = 0;
        this.direction = 1;
        this.el.textContent = '';
        this.start();
      }
      tick() {
        if (!this.running) return;
        const phrase = this.phrases[this.index];
        if (this.direction === 1) {
          this.ch++;
          this.el.textContent = phrase.slice(0, this.ch);
          if (this.ch === phrase.length) {
            this.direction = -1;
            this.timer = setTimeout(() => this.tick(), this.pauseAfter);
            return;
          }
        } else {
          this.ch--;
          this.el.textContent = phrase.slice(0, this.ch);
          if (this.ch === 0) {
            this.direction = 1;
            this.index = (this.index + 1) % this.phrases.length;
          }
        }
        const jitter = Math.max(40, this.delay + (Math.random() * 60 - 30));
        this.timer = setTimeout(() => this.tick(), jitter);
      }
    }

    /* ===========
       Helper utils
       =========== */
    function el(id) { return document.getElementById(id); }
    function debounce(fn, wait){ let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a), wait); }; }

    /* ===========
       Main Initialization
       =========== */
    (function(){
      const canvas = el('matrix');
      const rain = new MatrixRain(canvas);

      // Typer header
      const typer = new Typer(el('typer'), [
        'SYSTEM_OVERRIDE // SPROCKET',
        'INITIATING // LIVE_SCAN',
        'NEURAL_LINK // ONLINE',
        'TRACER // ACTIVE'
      ]);

      // elements
      const card = el('card');
      const searchInput = el('searchInput');
      const searchType = el('searchType');
      const scanBtn = el('scanBtn');
      const resultsWrap = el('results');
      const copyBtn = el('copyBtn');
      const toast = el('toast');
      const emailText = el('emailText');

      /* expand/contract interactions */
      // desktop: on mouseenter -> fast, mouseleave -> reset
      card.addEventListener('mouseenter', () => {
        rain.setState('fast');
      });
      card.addEventListener('mouseleave', () => {
        if (!card.classList.contains('expanded')) {
          // when leaving and not mobile-expanded
          rain.setState('normal');
          resetCardState();
        }
      });

      // mobile: tap toggles .expanded; clicking outside contracts
      let tapToggle = false;
      card.addEventListener('click', (e) => {
        // if user clicked inside search input or buttons, don't toggle
        if (e.target === searchInput || e.target === scanBtn || e.target === copyBtn || e.target.tagName === 'SELECT' || e.target.closest('.result-item')) return;
        // toggle expanded on small screens or if already not hovered
        if (window.matchMedia('(hover: none)').matches || window.innerWidth < 900) {
          card.classList.toggle('expanded');
          if (card.classList.contains('expanded')) {
            rain.setState('fast');
            // Reveal results area height handled by css
          } else {
            // contracted: reset everything
            rain.setState('normal');
            resetCardState();
          }
        }
      });

      // click outside to contract (mobile)
      document.addEventListener('click', (e) => {
        if (!card.contains(e.target) && card.classList.contains('expanded')) {
          card.classList.remove('expanded');
          rain.setState('normal');
          resetCardState();
        }
      });

      // keyboard: Escape resets
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          card.classList.remove('expanded');
          rain.setState('normal');
          resetCardState();
        }
      });

      /* COPY email */
      copyBtn.addEventListener('click', async () => {
        const text = 'sprocket1777@protonmail.com';
        try {
          await navigator.clipboard.writeText(text);
          showToast('SUCCESS: COPIED');
        } catch (err) {
          showToast('FAILED: COPY');
        }
      });

      function showToast(msg='SUCCESS: COPIED') {
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(()=>{ toast.style.display = 'none'; }, 2000);
      }

      /* SEARCH logic */
      const GITHUB_API_BASE = 'https://api.github.com';
      let lastQuery = '';
      let lastType = 'all';
      let controller = null;

      async function doSearch(query, type = 'all') {
        // basic guard
        if (!query || query.trim().length === 0) {
          resultsWrap.innerHTML = '';
          return;
        }
        // cancel previous
        if (controller) controller.abort();
        controller = new AbortController();
        const signal = controller.signal;

        lastQuery = query;
        lastType = type;

        // show interim
        resultsWrap.innerHTML = `<div style="color:rgba(0,255,0,0.35);font-size:13px;padding:8px">SCANNING…</div>`;

        try {
          const results = [];
          if (type === 'repositories' || type === 'all') {
            const url = `${GITHUB_API_BASE}/search/repositories?q=${encodeURIComponent(query)}&per_page=5`;
            const res = await fetch(url, { signal });
            if (!res.ok) throw new Error('API Error');
            const data = await res.json();
            const repos = (data.items || []).slice(0,5).map(r => ({
              kind: 'repo', name: r.full_name, desc: r.description || '', url: r.html_url
            }));
            results.push(...repos);
          }
          if (type === 'users' || type === 'all') {
            const url = `${GITHUB_API_BASE}/search/users?q=${encodeURIComponent(query)}&per_page=5`;
            const res = await fetch(url, { signal });
            if (!res.ok) throw new Error('API Error');
            const data = await res.json();
            const users = (data.items || []).slice(0,5).map(u => ({
              kind: 'user', name: u.login, avatar: u.avatar_url, url: u.html_url
            }));
            results.push(...users);
          }

          // If 'all', combine and take top 5 by simple priority (repos first then users)
          let final = results;
          if (type === 'all') final = (results.filter(r=>r.kind==='repo')).slice(0,3).concat((results.filter(r=>r.kind==='user')).slice(0,2)).slice(0,5);

          if (!final || final.length === 0) {
            triggerErrorState();
            renderNoResults();
            return;
          }

          // render
          renderResults(final);
        } catch (err) {
          if (err.name === 'AbortError') return;
          console.error(err);
          triggerErrorState();
          renderError(err);
        }
      }

      const debounced = debounce((val, type) => doSearch(val, type), 420);

      searchInput.addEventListener('input', (e) => {
        const q = e.target.value;
        const t = searchType.value;
        debounced(q, t);
      });

      // press Enter triggers immediate search
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          doSearch(searchInput.value, searchType.value);
        }
      });

      scanBtn.addEventListener('click', () => {
        doSearch(searchInput.value, searchType.value);
      });

      function renderResults(items) {
        card.classList.remove('glitch');
        rain.setState('fast'); // keep fast because card is expanded
        resultsWrap.innerHTML = '';
        const list = document.createElement('div');
        list.setAttribute('role','list');
        items.slice(0,5).forEach(item => {
          const a = document.createElement('a');
          a.className = 'result-item';
          a.href = item.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          if (item.kind === 'repo') {
            a.innerHTML = `<div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="meta" style="min-width:100px">REPO</div>
                <div style="font-weight:700">${escapeHtml(item.name)}</div>
              </div>
              <div style="color:rgba(0,255,0,0.45);font-size:12px;margin-top:6px">${escapeHtml(item.desc || '').slice(0,120)}</div>
            </div>`;
          } else {
            a.innerHTML = `<div style="display:flex;align-items:center;gap:10px">
              <img class="avatar" src="${item.avatar}" alt="${escapeHtml(item.name)} avatar" />
              <div>
                <div style="font-weight:700">${escapeHtml(item.name)}</div>
                <div class="meta" style="margin-top:4px">${item.kind.toUpperCase()}</div>
              </div>
            </div>`;
          }
          resultsWrap.appendChild(a);
        });
      }

      function renderNoResults() {
        resultsWrap.innerHTML = `<div style="color:var(--blood-red);font-size:13px;padding:8px">NO RESULTS FOUND</div>`;
      }

      function renderError(err) {
        resultsWrap.innerHTML = `<div style="color:var(--blood-red);font-size:13px;padding:8px">API ERROR: ${escapeHtml(err.message || '')}</div>`;
      }

      function triggerErrorState() {
        // apply glitch, set rain to error
        card.classList.add('glitch');
        rain.setState('error');
      }

      function resetCardState() {
        // Reset typing animation, clear input, clear results, remove glitch, reset rain speed/color
        typer.reset();
        searchInput.value = '';
        resultsWrap.innerHTML = '';
        card.classList.remove('glitch');
        rain.setState('normal');
      }

      // Utility to escape user-shown text
      function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; });
      }

      /* INITIAL state */
      rain.setState('normal');

      /* Accessibility: focus into input when card expanded by hover/click */
      card.addEventListener('transitionend', (e) => {
        // when card gets bigger, focus input for quick typing
        if ((card.classList.contains('expanded') || (window.matchMedia('(hover: hover)').matches && card.matches(':hover'))) && document.activeElement !== searchInput) {
          searchInput.focus({ preventScroll: true });
        }
      });

      // Prevent pointer events on canvas to allow interactions
      canvas.style.pointerEvents = 'none';
    })();
  </script>
</body>
</html>
